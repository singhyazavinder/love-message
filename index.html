<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heart-bg" id="heart-bg"></div>

    <!-- Stage 1: The Invitation (Sealed Letter) -->
    <section id="stage-intro" class="stage">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="letter">
                    <p>I have a special secret for you...</p>
                    <button class="btn-open" id="open-letter">Open It ❤️</button>
                </div>
            </div>
            <div class="heart-seal" id="heart-seal">❤️</div>
        </div>
        <h2 class="invitation-text">A little something for the girl who has my heart...</h2>
    </section>

    <!-- Stage 2: Catch the Feelings Minigame -->
    <section id="stage-game" class="stage hidden-stage">
        <div class="game-ui">
            <h2 id="game-instruction">Catch the hearts to fill our love!</h2>
            <div class="progress-container">
                <div id="game-progress" class="progress-fill"></div>
            </div>
            <p id="game-score">Love Captured: 0%</p>
        </div>
        <div id="game-canvas"></div>
    </section>

    <!-- Stage 3: The Big Reveal -->
    <section id="stage-reveal" class="stage hidden-stage">
        <div class="heart-wrapper">
            <div id="main-heart" class="main-heart pulse">❤️</div>
        </div>
        <div class="instruction-box">
            <p id="instruction">One final touch to reveal my heart...</p>
        </div>
    </section>

    <!-- Victory Screen (Final Message) -->
    <div id="victory-screen" class="victory-screen hidden-stage">
        <div class="victory-card">
            <h1>I Love You Forever!</h1>
            <div class="message-box">
                <p id="revealed-text"></p>
            </div>
            <div class="floating-hearts-burst">💖✨🌸✨💖</div>
            <button id="restart-btn" class="btn-restart">Relive the Magic ✨</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
